<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM'S GAME HUB</title>
    <style>
        :root { --bg: #f1f5f9; --sidebar: #ffffff; --text: #0f172a; --accent: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; z-index: 10; transition: 0.3s; }
        .sidebar.hidden { margin-left: -280px; }
        .logo { font-size: 1.5em; font-weight: 800; color: var(--text); margin-bottom: 30px; padding-left: 10px; border-left: 4px solid var(--accent); }
        
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #64748b; font-weight: 600; }
        .menu-item:hover { background: #f8fafc; color: var(--text); }
        .menu-item.active { background: #eff6ff; color: var(--accent); border-left: 3px solid var(--accent); }
        
        .main-content { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* Кнопка возврата из полноэкранной игры */
        #backBtn { 
            position: absolute; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #fff; 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; display: none; 
            font-family: monospace; font-size: 14px;
        }
        #backBtn:hover { background: #fff; color: #000; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; }
            .sidebar.hidden { margin-top: -100px; }
            .logo { display: none; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="logo">ROM'S HUB</div>
    <div class="menu-item active" onclick="loadGame('https://romasaf220-art.github.io/-/', this)">🔥 THE LEGEND (-/)</div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-224/', this)">💻 CYBER-IDLE v3.0</div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-54/', this)">🚀 NEW PROJECT (-54)</div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-31/', this)">🏎️ NEON DRIFT</div>
</div>

<div class="main-content">
    <button id="backBtn" onclick="showSidebar()">⬅ BACK TO HUB</button>
    <iframe id="gameFrame" src=""></iframe>
</div>

<script>
    const sidebar = document.getElementById('sidebar');
    const backBtn = document.getElementById('backBtn');
    const frame = document.getElementById('gameFrame');

    function loadGame(url, el) {
        document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
        if(el) el.classList.add('active');
        
        frame.src = url;
        
        // Если это Neon Drift (-31), скрываем сайдбар для полного погружения
        if(url.includes('-31')) {
            sidebar.classList.add('hidden');
            backBtn.style.display = 'block';
        } else {
            sidebar.classList.remove('hidden');
            backBtn.style.display = 'none';
        }
    }

    function showSidebar() {
        sidebar.classList.remove('hidden');
        backBtn.style.display = 'none';
    }

    // Загрузка первой игры
    window.onload = () => {
        const firstBtn = document.querySelector('.menu-item');
        if(firstBtn) firstBtn.click();
    }
</script>
</body>
</html>
