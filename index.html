<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM'S GAME HUB</title>
    <style>
        :root { --bg: #f1f5f9; --sidebar: #ffffff; --text: #0f172a; --accent: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .logo { font-size: 1.5em; font-weight: 800; color: var(--text); margin-bottom: 30px; padding-left: 10px; border-left: 4px solid var(--accent); }
        
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #64748b; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .menu-item:hover { background: #f8fafc; color: var(--text); }
        .menu-item.active { background: #eff6ff; color: var(--accent); border-left: 3px solid var(--accent); }
        
        /* Значок внешней ссылки */
        .external-icon { font-size: 0.8em; opacity: 0.5; }
        
        .main-content { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; }
            .logo { display: none; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ROM'S HUB</div>
    
    <!-- Игры внутри Хаба -->
    <div class="menu-item active" onclick="loadGame('https://romasaf220-art.github.io/-/', this)">
        🔥 THE LEGEND (-/)
    </div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-224/', this)">
        💻 CYBER-IDLE v3.0
    </div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-54/', this)">
        🚀 NEW PROJECT (-54)
    </div>
    
    <!-- Neon Drift открывается в НОВОЙ вкладке -->
    <a href="https://romasaf220-art.github.io/-31/" target="_blank" style="text-decoration:none; color:inherit;">
        <div class="menu-item">
            🏎️ NEON DRIFT 
            <span class="external-icon">↗</span>
        </div>
    </a>
</div>

<div class="main-content">
    <iframe id="gameFrame" src="https://romasaf220-art.github.io/-/"></iframe>
</div>

<script>
    function loadGame(url, el) {
        document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
        if(el) el.classList.add('active');
        document.getElementById('gameFrame').src = url;
    }
</script>
</body>
</html>
