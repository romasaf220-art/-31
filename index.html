<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM'S GAME HUB</title>
    <style>
        :root { --bg: #f1f5f9; --sidebar: #ffffff; --text: #0f172a; --accent: #3b82f6; --active: #eff6ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.02); }
        .logo { font-size: 1.5em; font-weight: 800; color: var(--text); margin-bottom: 30px; padding-left: 10px; border-left: 4px solid var(--accent); }
        
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #64748b; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: #f8fafc; color: var(--text); }
        .menu-item.active { background: var(--active); color: var(--accent); border-left: 3px solid var(--accent); }
        
        /* Main Area */
        .main-content { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* Placeholder for broken/empty games */
        .placeholder { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); color: var(--text); z-index: 5; }
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; border-bottom: 1px solid #e2e8f0; border-right: none; }
            .logo { display: none; }
            .menu-item { white-space: nowrap; margin-bottom: 0; margin-right: 10px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ROM'S HUB</div>
    
    <!-- Game 1: The Legend -->
    <div class="menu-item active" onclick="loadGame('https://romasaf220-art.github.io/-/', this)">
        🔥 THE LEGEND (-/)
    </div>
    
    <!-- Game 2: Cyber Idle -->
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-224/', this)">
        💻 CYBER-IDLE v3.0
    </div>

    <!-- Game 3: NEW GAME (-54) -->
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-54/', this)">
        🚀 NEW PROJECT (-54)
    </div>

    <!-- Game 4: Logic Grid (Placeholder if not ready) -->
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/logic/', this)">
        🧩 NEON GRID
    </div>
    
    <!-- Game 5: Drift -->
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/drift/', this)">
        🏎️ NEON DRIFT
    </div>
</div>

<div class="main-content">
    <div id="placeholderScreen" class="placeholder hidden">
        <h2 id="phTitle">Загрузка...</h2>
    </div>
    <iframe id="gameFrame" src="" allow="fullscreen"></iframe>
</div>

<script>
    function loadGame(url, element) {
        // Update UI
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
        
        // Hide placeholder and load game
        document.getElementById('placeholderScreen').classList.add('hidden');
        document.getElementById('gameFrame').src = url;
    }

    // Load first game by default
    window.onload = () => {
        const firstBtn = document.querySelector('.menu-item');
        if(firstBtn) firstBtn.click();
    }
</script>

</body>
</html>
