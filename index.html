<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON DRIFT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; color: white; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; pointer-events: none; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; border: 1px solid #0ff; }
        button { background: #0ff; border: none; padding: 10px 20px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="menu">
        <h1>DRIFT LITE</h1>
        <p>Тапай влево/вправо или используй стрелки</p>
        <button onclick="start()">PLAY</button>
    </div>
    <canvas id="c"></canvas>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let w, h, score = 0, playing = false;
let player = { x: 0, y: 0, w: 40, h: 60 };
let objs = [];
let speed = 5;

function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; player.x = w/2; player.y = h - 100; }
window.addEventListener('resize', resize); resize();

document.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft') player.x -= 40;
    if(e.key === 'ArrowRight') player.x += 40;
});
c.addEventListener('touchstart', e => {
    if(e.touches[0].clientX < w/2) player.x -= 40;
    else player.x += 40;
});

function start() {
    playing = true; score = 0; speed = 5; objs = [];
    document.getElementById('menu').style.display = 'none';
    loop();
}

function loop() {
    if(!playing) return;
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle = '#0ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    if(Math.random() < 0.05) {
        objs.push({ x: Math.random()*(w-50), y: -50, type: Math.random()>0.3?'enemy':'coin' });
    }

    objs.forEach((o, i) => {
        o.y += speed;
        ctx.fillStyle = o.type === 'enemy' ? '#f05' : '#ff0';
        ctx.fillRect(o.x, o.y, 50, 50);
        
        if(player.x < o.x+50 && player.x+player.w > o.x && player.y < o.y+50 && player.y+player.h > o.y) {
            if(o.type === 'coin') { score += 10; objs.splice(i,1); }
            else { playing = false; document.getElementById('menu').style.display = 'block'; }
        }
        if(o.y > h) objs.splice(i,1);
    });

    speed += 0.01;
    document.getElementById('score').innerText = score;
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
