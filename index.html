<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM'S GAME HUB</title>
    <style>
        :root { --bg: #f1f5f9; --sidebar: #ffffff; --text: #0f172a; --accent: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        /* Сайдбар скрывается полностью, когда игра активна */
        .sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; padding: 20px; z-index: 100; 
            transition: 0.3s; position: relative;
        }
        .sidebar.hidden { width: 0; padding: 0; border: none; overflow: hidden; }
        
        .logo { font-size: 1.5em; font-weight: 800; color: var(--text); margin-bottom: 30px; padding-left: 10px; border-left: 4px solid var(--accent); white-space: nowrap; }
        
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #64748b; font-weight: 600; white-space: nowrap; }
        .menu-item:hover { background: #f8fafc; color: var(--text); }
        .menu-item.active { background: #eff6ff; color: var(--accent); border-left: 3px solid var(--accent); }
        
        .main-content { flex: 1; position: relative; background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* Контейнер для встроенной игры теперь поверх всего */
        #builtin-game { 
            display: none; width: 100%; height: 100%; background: #050505; 
            position: absolute; top: 0; left: 0; z-index: 200; 
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; border-bottom: 1px solid #e2e8f0; border-right: none; }
            .sidebar.hidden { height: 0; padding: 0; border: none; }
            .logo { display: none; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="logo">ROM'S HUB</div>
    
    <!-- Кнопка "Назад в Хаб" (появится только в игре) -->
    <div class="menu-item" onclick="backToHub()" style="color: #ef4444; display:none;" id="backBtn">⬅ BACK TO HUB</div>

    <div class="menu-item active" onclick="loadExternal('https://romasaf220-art.github.io/-/', this)">🔥 THE LEGEND (-/)</div>
    <div class="menu-item" onclick="loadExternal('https://romasaf220-art.github.io/-224/', this)">💻 CYBER-IDLE v3.0</div>
    <div class="menu-item" onclick="loadExternal('https://romasaf220-art.github.io/-54/', this)"> NEW PROJECT (-54)</div>
    
    <!-- Встроенная игра -->
    <div class="menu-item" onclick="loadBuiltIn(this)">🏎️ NEON DRIFT (BUILT-IN)</div>
</div>

<div class="main-content">
    <iframe id="gameFrame" src=""></iframe>
    <div id="builtin-game"></div>
</div>

<script>
    // Код игры Neon Drift
    const driftGameCode = `
    <!DOCTYPE html>
    <html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <style>body{margin:0;overflow:hidden;background:#050505;color:#fff;font-family:monospace;touch-action:none}canvas{display:block}.ui{position:absolute;top:20px;left:20px;font-size:20px;font-weight:bold;pointer-events:none;z-index:10}.menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;background:rgba(0,0,0,0.9);padding:30px;border:2px solid #00ff9d;border-radius:10px;z-index:20}button{background:#00ff9d;border:none;padding:10px 20px;font-size:18px;cursor:pointer;font-weight:bold;margin-top:10px}</style></head><body>
    <div class='ui'>DIST: <span id='dist'>0</span>m | 💰 <span id='money'>0</span></div>
    <div id='menu' class='menu'><h1>NEON DRIFT</h1><p>Тапай влево/вправо или стрелки</p><button onclick='start()'>START</button></div>
    <canvas id='c'></canvas>
    <script>
    const c=document.getElementById('c'),ctx=c.getContext('2d');let w,h,score=0,money=0,playing=false;
    let p={x:0,y:0,w:40,h:70,vx:0},objs=[],speed=8,input={l:false,r:false};
    function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;p.x=w/2-20;p.y=h-150;}
    window.onresize=resize;resize();
    document.onkeydown=e=>{if(e.key==='ArrowLeft')input.l=true;if(e.key==='ArrowRight')input.r=true;};
    document.onkeyup=e=>{if(e.key==='ArrowLeft')input.l=false;if(e.key==='ArrowRight')input.r=false;};
    c.ontouchstart=e=>{if(e.touches[0].clientX<w/2)input.l=true;else input.r=true;};
    c.ontouchend=()=>input={l:false,r:false};
    function start(){playing=true;score=0;speed=8;objs=[];document.getElementById('menu').style.display='none';loop();}
    function loop(){
        if(!playing)return;
        ctx.fillStyle='rgba(5,5,5,0.4)';ctx.fillRect(0,0,w,h);
        if(input.l)p.vx-=0.6;if(input.r)p.vx+=0.6;
        p.vx*=0.92;p.x+=p.vx;
        if(p.x<0){p.x=0;p.vx*=-0.5;}if(p.x>w-p.w){p.x=w-p.w;p.vx*=-0.5;}
        ctx.strokeStyle='#222';ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.stroke();
        if(Math.random()<0.02)objs.push({x:Math.random()*(w-60)+30,y:-100,t:Math.random()>0.3?'e':'c'});
        objs.forEach((o,i)=>{
            o.y+=speed;
            ctx.fillStyle=o.t==='e'?'#ff0055':'#ffd700';
            if(o.t==='c'){ctx.beginPath();ctx.arc(o.x+30,o.y+30,25,0,Math.PI*2);ctx.fill();}
            else ctx.fillRect(o.x,o.y,60,60);
            if(p.x<o.x+60&&p.x+p.w>o.x&&p.y<o.y+60&&p.y+p.h>o.y){
                if(o.t==='c'){money+=50;objs.splice(i,1);}
                else{playing=false;document.getElementById('menu').style.display='block';}
            }
            if(o.y>h)objs.splice(i,1);
        });
        ctx.shadowBlur=15;ctx.shadowColor='#00ff9d';ctx.fillStyle='#00ff9d';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.shadowBlur=0;
        score+=speed/20;
        document.getElementById('dist').innerText=Math.floor(score);
        document.getElementById('money').innerText=money;
        requestAnimationFrame(loop);
    }
    <\/script></body></html>
    `;

    const sidebar = document.getElementById('sidebar');
    const backBtn = document.getElementById('backBtn');

    function loadExternal(url, el) {
        document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
        if(el) el.classList.add('active');
        
        // Показываем сайдбар
        sidebar.classList.remove('hidden');
        backBtn.style.display = 'none';
        
        // Скрываем встроенную игру
        document.getElementById('builtin-game').style.display = 'none';
        document.getElementById('builtin-game').innerHTML = '';
        
        // Загружаем iframe
        const frame = document.getElementById('gameFrame');
        frame.style.display = 'block';
        frame.src = url;
    }

    function loadBuiltIn(el) {
        document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
        if(el) el.classList.add('active');

        // СКРЫВАЕМ САЙДБАР ПОЛНОСТЬЮ
        sidebar.classList.add('hidden');
        backBtn.style.display = 'block'; // Показываем кнопку назад

        // Скрываем iframe
        document.getElementById('gameFrame').style.display = 'none';
        document.getElementById('gameFrame').src = ''; 
        
        // Запускаем встроенную игру
        const container = document.getElementById('builtin-game');
        container.style.display = 'block';
        container.innerHTML = driftGameCode;
    }

    function backToHub() {
        sidebar.classList.remove('hidden');
        backBtn.style.display = 'none';
        document.getElementById('builtin-game').style.display = 'none';
        document.getElementById('builtin-game').innerHTML = '';
        
        // Возвращаем первую игру по умолчанию
        const firstBtn = document.querySelector('.menu-item:nth-child(2)'); // Пропускаем кнопку Back
        if(firstBtn) firstBtn.click();
    }

    // Старт
    window.onload = () => {
        const firstBtn = document.querySelector('.menu-item:nth-child(2)');
        if(firstBtn) firstBtn.click();
    }
</script>
</body>
</html>
