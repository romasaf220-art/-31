<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM'S GAME HUB</title>
    <style>
        :root { --bg: #f1f5f9; --sidebar: #ffffff; --text: #0f172a; --accent: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .logo { font-size: 1.5em; font-weight: 800; color: var(--text); margin-bottom: 30px; padding-left: 10px; border-left: 4px solid var(--accent); }
        
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #64748b; font-weight: 600; }
        .menu-item:hover { background: #f8fafc; color: var(--text); }
        .menu-item.active { background: #eff6ff; color: var(--accent); border-left: 3px solid var(--accent); }
        
        .main-content { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .error-msg { color: white; text-align: center; display: none; }
        .error-msg a { color: var(--accent); }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 10px; }
            .logo { display: none; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ROM'S HUB</div>
    
    <div class="menu-item active" onclick="loadGame('https://romasaf220-art.github.io/-/', this)">🔥 THE LEGEND (-/)</div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-224/', this)">💻 CYBER-IDLE v3.0</div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/-54/', this)">🚀 NEW PROJECT (-54)</div>
    <div class="menu-item" onclick="loadGame('https://romasaf220-art.github.io/drift/', this)">🏎️ NEON DRIFT</div>
</div>

<div class="main-content">
    <div id="errorMsg" class="error-msg">
        <h2>Игра не загружается внутри Хаба.</h2>
        <p>Попробуй открыть её напрямую:</p>
        <br>
        <a id="directLink" href="#" target="_blank" style="padding: 10px 20px; border: 1px solid white; text-decoration: none;">ОТКРЫТЬ В НОВОЙ ВКЛАДКЕ</a>
    </div>
    <iframe id="gameFrame" src="" allow="fullscreen" onload="hideError()" onerror="showError()"></iframe>
</div>

<script>
    function loadGame(url, el) {
        document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
        if(el) el.classList.add('active');
        
        const frame = document.getElementById('gameFrame');
        const errorDiv = document.getElementById('errorMsg');
        const link = document.getElementById('directLink');
        
        frame.style.display = 'block';
        errorDiv.style.display = 'none';
        frame.src = url;
        link.href = url;
    }

    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }
    
    // Загрузка первой игры при старте
    window.onload = () => {
        const firstBtn = document.querySelector('.menu-item');
        if(firstBtn) firstBtn.click();
    }
</script>

</body>
</html>
