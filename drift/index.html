<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DRIFT: BALANCED</title>
    <style>
        :root { --bg: #050505; --accent: #00ff9d; --gold: #ffd700; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; touch-action: none; }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI */
        .ui-layer { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-top { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; text-shadow: 0 0 10px currentColor; }
        .money-val { color: var(--gold); }
        
        /* Menus */
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5,5,5,0.95); padding: 30px; border: 2px solid var(--accent); border-radius: 10px; text-align: center; pointer-events: auto; min-width: 300px; box-shadow: 0 0 30px rgba(0,255,157,0.2); }
        .hidden { display: none !important; }
        
        h1 { font-size: 1.8em; margin-bottom: 15px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 10px 25px; font-size: 1em; font-family: inherit; cursor: pointer; transition: 0.2s; margin: 8px 0; width: 100%; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: var(--accent); color: #000; }
        .btn-secondary { border-color: #666; color: #aaa; }
        .btn-secondary:hover { background: #333; color: #fff; }

        /* Shop Items */
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #222; }
        .skin-preview { width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <div class="hud-top">
        <div>DIST: <span id="distDisplay">0</span>m</div>
        <div class="money-val">💰 <span id="moneyDisplay">0</span></div>
    </div>
</div>

<!-- Main Menu -->
<div id="mainMenu" class="menu">
    <h1>NEON DRIFT</h1>
    <button class="btn" onclick="startGame()">START</button>
    <button class="btn btn-secondary" onclick="showShop()">SHOP</button>
</div>

<!-- Shop -->
<div id="shopMenu" class="menu hidden">
    <h1>SHOP</h1>
    <div style="margin-bottom:15px; color:var(--gold)">BALANCE: <span id="shopMoney">0</span> 💰</div>
    
    <h3 style="color:#888; font-size:0.9em; margin-bottom:10px;">SKINS</h3>
    <div id="skinsList"></div>
    
    <h3 style="color:#888; font-size:0.9em; margin:15px 0 10px;">UPGRADES</h3>
    <div id="upgradesList"></div>
    
    <button class="btn btn-secondary" onclick="showMain()">BACK</button>
</div>

<!-- Game Over -->
<div id="gameOverMenu" class="menu hidden">
    <h1 style="color:#ff0055">CRASHED</h1>
    <p style="margin-bottom:10px">DIST: <span id="finalDist">0</span>m</p>
    <p style="margin-bottom:15px; color:var(--gold)">EARNED: +<span id="earnedMoney">0</span> 💰</p>
    <button class="btn" onclick="startGame()">RETRY</button>
    <button class="btn btn-secondary" onclick="showShop()">SHOP</button>
</div>

<script>
/** NEON DRIFT: BALANCED ENGINE **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w, h;

// State & Save
let state = {
    money: parseInt(localStorage.getItem('nd_bal_money') || '0'),
    skin: localStorage.getItem('nd_bal_skin') || 'cyan',
    upgrades: JSON.parse(localStorage.getItem('nd_bal_upg') || '{"speed":1, "handling":1}'),
    playing: false,
    dist: 0, earned: 0, speed: 0, objs: [], particles: [], roadOffset: 0
};

const skins = [
    {id: 'cyan', color: '#00ff9d', cost: 0},
    {id: 'magenta', color: '#ff00ff', cost: 1000},
    {id: 'gold', color: '#ffd700', cost: 5000}
];

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// Input (Smooth Physics)
let input = { left: false, right: false };
document.addEventListener('keydown', e => { if(e.key==='ArrowLeft') input.left=true; if(e.key==='ArrowRight') input.right=true; });
document.addEventListener('keyup', e => { if(e.key==='ArrowLeft') input.left=false; if(e.key==='ArrowRight') input.right=false; });
canvas.addEventListener('touchstart', e => {
    if(e.touches[0].clientX < w/2) input.left=true; else input.right=true;
});
canvas.addEventListener('touchend', () => input = {left:false, right:false});

const player = { x: 0, y: 0, w: 40, h: 70, vx: 0 };

class Particle {
    constructor(x, y, c) { this.x=x; this.y=y; this.c=c; this.vx=(Math.random()-0.5)*2; this.vy=Math.random()*2+2; this.life=1; this.size=Math.random()*3+1; }
    update() { this.x+=this.vx; this.y+=this.vy; this.life-=0.03; this.size*=0.95; }
    draw() { ctx.globalAlpha=this.life; ctx.fillStyle=this.c; ctx.fillRect(this.x,this.y,this.size,this.size*2); ctx.globalAlpha=1; }
}

function startGame() {
    state.playing = true; state.dist = 0; state.earned = 0;
    // Comfortable Speed
    state.speed = 8 + (state.upgrades.speed * 1); 
    state.objs = []; state.particles = [];
    player.x = w/2 - 20; player.y = h - 150; player.vx = 0;
    
    document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
    gameLoop();
}

function gameLoop() {
    if(!state.playing) return;
    
    ctx.fillStyle = 'rgba(5,5,5,0.4)'; ctx.fillRect(0,0,w,h);
    
    // Road
    state.roadOffset = (state.roadOffset + state.speed) % 100;
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke();
    
    // Physics (Smooth)
    const handling = 0.5 + (state.upgrades.handling * 0.1);
    if(input.left) player.vx -= handling;
    if(input.right) player.vx += handling;
    player.vx *= 0.92; player.x += player.vx;
    if(player.x < 0) { player.x = 0; player.vx = -player.vx*0.5; }
    if(player.x > w-player.w) { player.x = w-player.w; player.vx = -player.vx*0.5; }
    
    // Particles
    if(Math.random()>0.5) state.particles.push(new Particle(player.x+10, player.y+70, '#555'));
    if(Math.random()>0.5) state.particles.push(new Particle(player.x+30, player.y+70, '#555'));

    // Spawning
    if(Math.random() < 0.02) {
        const type = Math.random() > 0.3 ? 'obstacle' : 'coin';
        state.objs.push({ x: Math.random()*(w-60)+30, y: -100, w: 60, h: 60, type: type, active: true });
    }

    // Objects
    state.objs.forEach(o => {
        o.y += state.speed;
        if(o.active && player.x < o.x+o.w && player.x+player.w > o.x && player.y < o.y+o.h && player.y+player.h > o.y) {
            if(o.type === 'coin') { state.earned += 50; o.active = false; }
            else gameOver();
        }
    });
    state.objs = state.objs.filter(o => o.y < h+100 && o.active);
    state.dist += state.speed / 20;

    // Draw Player
    const skinColor = skins.find(s=>s.id===state.skin)?.color || '#fff';
    ctx.shadowBlur = 15; ctx.shadowColor = skinColor; ctx.fillStyle = skinColor;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // Draw Objects
    state.objs.forEach(o => {
        ctx.shadowBlur = 10;
        ctx.fillStyle = o.type === 'obstacle' ? '#ff0055' : '#ffd700';
        ctx.shadowColor = ctx.fillStyle;
        if(o.type === 'coin') { ctx.beginPath(); ctx.arc(o.x+30, o.y+30, 25, 0, Math.PI*2); ctx.fill(); }
        else ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.shadowBlur = 0;
    });

    // Particles
    state.particles = state.particles.filter(p => p.life > 0);
    state.particles.forEach(p => { p.update(); p.draw(); });

    document.getElementById('distDisplay').innerText = Math.floor(state.dist);
    document.getElementById('moneyDisplay').innerText = state.money;
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    state.playing = false; state.money += state.earned; saveGame();
    document.getElementById('finalDist').innerText = Math.floor(state.dist);
    document.getElementById('earnedMoney').innerText = state.earned;
    document.getElementById('gameOverMenu').classList.remove('hidden');
}

function saveGame() {
    localStorage.setItem('nd_bal_money', state.money);
    localStorage.setItem('nd_bal_skin', state.skin);
    localStorage.setItem('nd_bal_upg', JSON.stringify(state.upgrades));
}

// UI Logic
function showShop() {
    document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
    document.getElementById('shopMenu').classList.remove('hidden');
    renderShop();
}
function showMain() {
    document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
    document.getElementById('mainMenu').classList.remove('hidden');
}

function renderShop() {
    document.getElementById('shopMoney').innerText = state.money;
    
    // Skins
    const sList = document.getElementById('skinsList'); sList.innerHTML = '';
    skins.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.innerHTML = `<div><span class="skin-preview" style="background:${s.color}"></span>${s.id.toUpperCase()}</div>
                         <button class="btn" style="width:auto;padding:5px 10px;margin:0;font-size:0.8em" 
                         onclick="buySkin('${s.id}', ${s.cost})">${state.skin===s.id?'OWNED':s.cost+'💰'}</button>`;
        sList.appendChild(div);
    });

    // Upgrades
    const uList = document.getElementById('upgradesList'); uList.innerHTML = '';
    ['speed', 'handling'].forEach(id => {
        const lvl = state.upgrades[id];
        const cost = 200 * Math.pow(1.5, lvl);
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.innerHTML = `<div><b>${id.toUpperCase()}</b> <span style="color:#888;font-size:0.8em">Lvl ${lvl}</span></div>
                         <button class="btn" style="width:auto;padding:5px 10px;margin:0;font-size:0.8em" 
                         onclick="buyUpg('${id}', ${cost})">${cost}💰</button>`;
        uList.appendChild(div);
    });
}

function buySkin(id, cost) {
    if(state.money >= cost) { state.money -= cost; state.skin = id; saveGame(); renderShop(); }
}
function buyUpg(id, cost) {
    if(state.money >= cost) { state.money -= cost; state.upgrades[id]++; saveGame(); renderShop(); }
}

saveGame();
</script>
</body>
</html>
